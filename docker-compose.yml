services:
  postgres:
    image: postgres:16-alpine
    container_name: saas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2026
      POSTGRES_DB: dev_saas_backend
    ports:
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    # HIGHLIGHT: The Healthcheck
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d dev_saas_backend']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: saas_api
    restart: always
    ports:
      - '5000:5000'
    environment:
      # HIGHLIGHT: Internal Network Hostname
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:2026@postgres:5432/dev_saas_backend?schema=public
      - NODE_ENV=development
      - JWT_ACCESS_SECRET=super-long-random-access-secret-32+chars
      - JWT_REFRESH_SECRET=super-long-random-refresh-secret-64+chars
      - PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - MAIL_HOST=smtp.ethereal.email
      - MAIL_PORT=587
      - MAIL_USER=winifred.sipes@ethereal.email
      - MAIL_PASS=gRxGUbpFzAAZywQaTY

    # HIGHLIGHT: Waiting for the DB to actually be READY
    volumes:
      - .:/app # Links your whole project folder to /app in Linux
      - /app/node_modules # Keeps node_modules inside Linux (prevents Windows conflicts)
      - /app/apps/api/node_modules
    command: npx tsx watch --tsconfig apps/api/tsconfig.json apps/api/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
